name: Convert MD to HTML and Generate Sitemap

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Pandoc
        run: sudo apt-get install -y pandoc

      - name: Delete old converted HTML files
        run: |
          find . -maxdepth 1 -name "*.html" \
            ! -name "index.html" \
            ! -name "sandbox.html" \
            ! -name "template.html" \
            -delete

      - name: Copy template to Pandoc directory
        run: |
          mkdir -p /usr/share/pandoc/data/templates
          cp "$GITHUB_WORKSPACE/template.html" /usr/share/pandoc/data/templates/template.html

      - name: Convert all MD to HTML
        run: |
          for f in *.md; do
            [ -f "$f" ] || continue
            TITLE=$(basename "${f%.md}" | tr '-' ' ')
            pandoc "$f" \
              --from markdown+fenced_code_blocks+backtick_code_blocks+pipe_tables \
              --to html5 \
              --template=template.html \
              --metadata title="$TITLE" \
              --output "${f%.md}.html"
            echo "Converted: $f -> ${f%.md}.html"
          done

      - name: Generate sitemap
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          echo '  <url><loc>https://accountability.ai/</loc><priority>1.0</priority></url>' >> sitemap.xml
          echo '  <url><loc>https://accountability.ai/sandbox.html</loc><priority>0.9</priority></url>' >> sitemap.xml
          for f in *.html; do
            [ -f "$f" ] || continue
            if [ "$f" != "index.html" ] && [ "$f" != "sandbox.html" ] && [ "$f" != "template.html" ]; then
              echo "  <url><loc>https://accountability.ai/${f}</loc><priority>0.7</priority></url>" >> sitemap.xml
            fi
          done
          echo '</urlset>' >> sitemap.xml

      - name: Commit and push HTML and sitemap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-generated HTML and sitemap [skip ci]"
            git push origin main
          fi
